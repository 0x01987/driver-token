services:
  - type: web
    name: driver-token-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driver-token-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CLAIM_SIGNER_PRIVATE_KEY
        sync: false
      - key: CHAIN_ID
        value: "84532"
      - key: DRIVER_TOKEN_CONTRACT
        sync: false
      - key: UBER_CLIENT_ID
        sync: false
      - key: UBER_CLIENT_SECRET
        sync: false
      - key: UBER_REDIRECT_URI
        sync: false
      - key: UBER_SCOPES
        value: profile history

databases:
  - name: driver-token-db
    databaseName: driver_token
    user: driver_token
